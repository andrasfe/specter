# Example coverage strategy configuration for Specter.
#
# Two modes:
#   1. Explicit rounds: define a sequence of (strategy, batch_size) pairs.
#   2. Selector-driven: list strategies and let the heuristic/LLM selector pick.
#
# If neither "rounds" nor "strategies" is set, the default strategy set is used.

selector: heuristic
default_batch_size: 200

termination:
  max_stale_rounds: 10
  plateau_para_pct: 0.9
  plateau_branch_pct: 0.8
  extended_stale_limit: 30

# Explicit round sequence — uncomment to use:
# rounds:
#   - strategy: baseline
#     batch_size: 500
#   - strategy: direct_paragraph
#     batch_size: 5000
#   - strategy: direct_paragraph
#     batch_size: 5000
#   - strategy: fault_injection
#     batch_size: 500
#   - strategy: branch_solver
#     batch_size: 500
#   - strategy: llm_runtime
#     batch_size: 100
#   - strategy: guided_mutation
#     batch_size: 500
#   - strategy: monte_carlo
#     batch_size: 2000
# loop_from: 1

# Selector-driven with custom strategy list — uncomment to use:
# strategies:
#   - baseline
#   - direct_paragraph
#   - fault_injection
#   - branch_solver
#   - guided_mutation
#   - monte_carlo

# LLM seed generation settings:
seed_generation:
  paragraphs_per_batch: 10   # paragraphs sent per LLM call (lower = more focused seeds)
  seeds_per_batch: 8         # test scenarios requested per LLM call
  cache: true                # cache seeds to _seeds.json (set false to regenerate)
  # For large programs (1000+ paragraphs), consider:
  #   paragraphs_per_batch: 5   (more focused batches)
  #   seeds_per_batch: 12       (more seeds per batch)

# COBOL validation pass — run after Python synthesis to confirm coverage
# against the real COBOL binary. Requires --cobol-source and --copybook-dir.
# validation:
#   enabled: true
#   timeout_per_case: 30    # seconds per COBOL test execution

# Per-strategy parameter overrides:
strategy_params:
  llm_runtime:
    max_calls: 5
    min_stale_rounds: 1

# Available strategies:
#   baseline           - 5 base cases per value strategy (one-shot)
#   constraint_solver  - Gating condition satisfaction
#   direct_paragraph   - 6-phase rotation: param, stub, dataflow, frontier, harvest, inverse
#   branch_solver      - Condition-variable satisfaction per branch
#   fault_injection    - Sweep all stub ops x fault values (one-shot)
#   stub_walk          - Frozen inputs + pairwise fault combos (one-shot)
#   guided_mutation    - Random walks from high-coverage test cases
#   monte_carlo        - Random exploration with domain-aware inputs
#   llm_seed           - LLM-generated initial seeds (one-shot, needs LLM)
#   llm_runtime        - LLM runtime steering with code slices (needs LLM)
#   intent_driven      - LLM business-scenario generation (one-shot, needs LLM)
