# Specter coverage strategy configuration.
#
# Two modes:
#   1. Explicit rounds: define a sequence of (strategy, batch_size) pairs.
#   2. Selector-driven (default): heuristic selector picks based on yield.
#
# If neither "rounds" nor "strategies" is set, all 4 strategies run.

default_batch_size: 200

termination:
  max_stale_rounds: 10
  plateau_para_pct: 0.9
  plateau_branch_pct: 0.8
  extended_stale_limit: 30

# Explicit round sequence — uncomment to use:
# rounds:
#   - strategy: baseline
#     batch_size: 500
#   - strategy: direct_paragraph
#     batch_size: 5000
#   - strategy: corpus_fuzz
#     batch_size: 2000
#   - strategy: fault_injection
#     batch_size: 500
# loop_from: 1

# Selector-driven with custom strategy list — uncomment to use:
# strategies:
#   - baseline
#   - direct_paragraph
#   - corpus_fuzz
#   - fault_injection

# LLM seed generation (optional — only runs with --llm-provider):
seed_generation:
  paragraphs_per_batch: 10   # paragraphs per LLM call (lower = more focused)
  seeds_per_batch: 8         # scenarios requested per LLM call
  cache: true                # cache to _seeds.json (false to regenerate)

# COBOL validation — auto-validate after synthesis:
# validation:
#   enabled: true
#   timeout_per_case: 30

# Available strategies:
#   baseline           - 5 base cases per value strategy (one-shot)
#   direct_paragraph   - 7-phase rotation with chain constraint solver
#   corpus_fuzz        - AFL-inspired coverage-guided fuzzing with power schedule
#   fault_injection    - Sweep stub ops x fault values (one-shot)
